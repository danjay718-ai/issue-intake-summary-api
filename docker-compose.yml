version: '3.8'

services:
  # Primary Web API Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: issue-intake-api
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - QUEUE_CONNECTION=database
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - queue

  # Background Queue Worker Service
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: issue-intake-queue
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - QUEUE_CONNECTION=database
    command: php artisan queue:work --tries=3
